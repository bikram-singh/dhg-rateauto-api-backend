apiVersion: apps/v1
kind: Deployment
metadata:
  name: __DEPLOYMENT_NAME__
  namespace: __NAMESPACE__
  labels:
    app: __APP_NAME__
    app.kubernetes.io/name: __APP_NAME__
    app.kubernetes.io/component: api
    app.kubernetes.io/version: __APP_VERSION__
    app.kubernetes.io/environment: __ENVIRONMENT__
spec:
  replicas: __REPLICAS__
  progressDeadlineSeconds: 900
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: __APP_NAME__
  template:
    metadata:
      labels:
        app: __APP_NAME__
        app.kubernetes.io/name: __APP_NAME__
        app.kubernetes.io/component: api
        app.kubernetes.io/version: __APP_VERSION__
        app.kubernetes.io/environment: __ENVIRONMENT__
    spec:
      serviceAccountName: __SERVICE_ACCOUNT_NAME__
      containers:
        - name: __APP_NAME__
          image: __IMAGE_URL__
          imagePullPolicy: Always
          ports:
            - containerPort: __CONTAINER_PORT__
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "__CONTAINER_PORT__"
            - name: APP_ENV
              value: __ENVIRONMENT__
            - name: GCP_PROJECT_ID
              value: "dhg-vaccine-rateauto-nonpord"
            # DB credentials from Kubernetes Secret
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: dhg-vaccinefee-db-secret
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: dhg-vaccinefee-db-secret
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: dhg-vaccinefee-db-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: dhg-vaccinefee-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dhg-vaccinefee-db-secret
                  key: DB_PASSWORD
          resources:
            requests:
              memory: __REQUEST_MEMORY__
              cpu: __REQUEST_CPU__
            limits:
              memory: __LIMIT_MEMORY__
              cpu: __LIMIT_CPU__
          livenessProbe:
            httpGet:
              path: /healthz
              port: __CONTAINER_PORT__
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: __CONTAINER_PORT__
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
      restartPolicy: Always
